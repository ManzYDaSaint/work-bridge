<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkBridge Offline</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f1e8;
      color: #16324f;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: rgba(255,255,255,0.9);
      border: 1px solid #e7dfd2;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(22, 50, 79, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #516174;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>WorkBridge is offline</h1>
    <p>Reconnect to keep browsing jobs, managing applications, and reviewing candidates.</p>
  </div>
</body>
</html>
